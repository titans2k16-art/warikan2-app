<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居酒屋割り勘アプリ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #333;
      margin: 0;
      padding: 16px;
    }
    .container {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      color: #0056b3;
      margin-top: 0;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #0056b3;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .input-group button {
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-weight: bold;
    }
    
    /* 設定エリア */
    .settings-area {
      background-color: #e9ecef;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
    }
    .settings-area input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .member-list {
      list-style: none;
      padding: 0;
      margin: 0;
      margin-bottom: 12px;
    }
    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8f9fa;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    
    /* ★追加：傾斜設定用のセレクトボックススタイル★ */
    .weight-select {
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 12px;
      background-color: #fff;
      margin-right: 8px;
    }

    .delete-btn {
      color: #ff4d4f;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      padding: 0 4px;
    }
    .receipt-item {
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .receipt-item-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .assign-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px dashed #ccc;
      padding-top: 10px;
    }
    .assign-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      background-color: #ffffff;
      border: 1px solid #eee;
    }
    .assign-row.active {
      background-color: #fff0f0;
      border-color: #ff6b6b;
    }
    .assign-row.all-active {
      background-color: #e6f2ff;
      border-color: #0056b3;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background-color: #e2e8f0;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .qty-btn.plus {
      background-color: #ff6b6b;
      color: white;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
    }
    .btn-secondary {
      background-color: #6c757d;
      margin-top: 0;
    }
    /* スクショ用ボタンの色 */
    .btn-screenshot {
      background-color: #28a745; 
      margin-top: 12px;
    }
    
    #imagePreviewArea {
      display: none;
      text-align: center;
      margin-bottom: 16px;
    }
    #imagePreviewArea img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    #loadingMessage {
      display: none;
      text-align: center;
      color: #0056b3;
      font-weight: bold;
      margin-bottom: 16px;
    }
    #resultArea {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background-color: #fff0f0;
      border: 2px solid #ff6b6b;
      border-radius: 8px;
    }
    .result-item {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .result-detail {
      font-size: 12px;
      color: #666;
    }
    /* ★追加：結果の総合計表示用スタイル★ */
    .result-summary {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 2px dashed #ff6b6b;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: #d9534f;
    }
  </style>
</head>
<body>

  <div class="container" id="appContainer">
    <h1>🍻 居酒屋割り勘アプリ</h1>

    <div class="settings-area">
      <label for="apiKeyInput"><strong>⚙️ Gemini APIキー</strong> (初回のみ入力)</label>
      <input type="password" id="apiKeyInput" placeholder="AQ. から始まるキーを入力">
      <button onclick="saveApiKey()" style="padding: 6px 12px; background: #333; color: white; border: none; border-radius: 4px;">保存する</button>
      <span id="apiKeyStatus" style="color: green; display: none; margin-left: 8px;">保存しました！</span>
    </div>

    <div class="section">
      <div class="section-title">1. メンバー登録 ＆ 傾斜設定</div>
      <div class="input-group">
        <input type="text" id="memberName" placeholder="名前（例：山田）">
        <button onclick="addMember()">追加</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
    </div>

    <div class="section">
      <div class="section-title">2. レシート仕分け</div>
      
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleImageUpload(event)">
      <button class="btn btn-secondary" onclick="triggerCameraClick()" style="margin-bottom: 12px;">📸 レシートを撮影して読み込む</button>
      
      <div id="imagePreviewArea">
        <img id="receiptImagePreview" src="" alt="レシートプレビュー">
      </div>

      <div id="loadingMessage">⏳ 最新のGemini 2.5でレシートを解析中...</div>

      <div id="receiptItemsArea"></div>
    </div>

    <button class="btn" onclick="calculate()">💰 割り勘を計算する</button>

    <div id="resultArea">
      <h2 style="font-size: 18px; margin-top: 0; color: #ff6b6b; text-align: center;">お会計結果</h2>
      <ul class="member-list" id="resultList"></ul>
      
      <div id="resultSummary" class="result-summary"></div>
      
      <button class="btn btn-screenshot" onclick="takeScreenshot()">📸 画面をスクショ保存する</button>
    </div>
  </div>

  <script>
    // メンバーのデータ構造を {name: 名前, weight: 傾斜比率} に変更
    let members = [];
    let receiptItems = [];

    window.onload = function() {
      const savedKey = localStorage.getItem('geminiApiKey');
      if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
      }
    };

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        localStorage.setItem('geminiApiKey', key); 
        const status = document.getElementById('apiKeyStatus');
        status.style.display = 'inline';
        setTimeout(() => status.style.display = 'none', 2000);
      } else {
        alert("APIキーを入力してください。");
      }
    }

    function addMember() {
      const input = document.getElementById('memberName');
      const name = input.value.trim();
      if (name !== "") {
        // 初期状態の傾斜は「1.0 (通常)」
        members.push({ name: name, weight: 1.0 });
        input.value = "";
        updateUI();
      }
    }

    // ★追加：傾斜（比率）が変更されたときの処理★
    function changeWeight(index, value) {
      members[index].weight = parseFloat(value);
    }

    function deleteMember(index) {
      members.splice(index, 1);
      updateUI();
    }

    // ★機能追加：レシート撮影ボタンを押したときのチェックと親切な案内★
    function triggerCameraClick() {
      if (members.length === 0) {
        alert("🚨 メンバーが1人も登録されていません！\n\nレシートを撮影する前に、まずは一番上の『1. メンバー登録』から、一緒に飲んでいるお友達の名前を追加してください。");
        return;
      }
      // メンバーがいる場合のみ、隠しカメラ入力をクリックして起動
      document.getElementById('cameraInput').click();
    }

    async function handleImageUpload(event) {
      const apiKey = localStorage.getItem('geminiApiKey');
      if (!apiKey) {
        alert("一番上の設定欄にGemini APIキーを入力して保存してください！");
        event.target.value = "";
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Image = e.target.result;
        document.getElementById('receiptImagePreview').src = base64Image;
        document.getElementById('imagePreviewArea').style.display = 'block';
        
        document.getElementById('loadingMessage').style.display = 'block';
        document.getElementById('receiptItemsArea').innerHTML = ""; 
        
        const base64Data = base64Image.split(',')[1];
        await analyzeReceiptWithGemini(base64Data, apiKey);
      }
      reader.readAsDataURL(file);
    }

    // --- AI（Gemini 2.5 Flash）と通信する処理 ---
    async function analyzeReceiptWithGemini(base64Data, apiKey) {
      const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      
      const promptText = `
        このレシート画像から、品名と金額を読み取ってください。
        出力は必ず以下のJSON形式の配列「のみ」とし、マークダウン（\`\`\`json など）やその他の文章は一切含めないでください。
        合計金額やお釣りなどの項目は除外し、注文した品物だけを抽出してください。
        例: [{"name": "生ビール", "price": 500}, {"name": "枝豆", "price": 300}]
      `;

      const requestBody = {
        contents: [{
          parts: [
            { text: promptText },
            { inlineData: { mimeType: "image/jpeg", data: base64Data } }
          ]
        }]
      };

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          const errorMessage = errorData.error ? errorData.error.message : response.statusText;
          throw new Error(`エラーコード: ${response.status}\n理由: ${errorMessage}`);
        }

        const data = await response.json();
        let aiResponseText = data.candidates[0].content.parts[0].text;
        
        aiResponseText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();

        const extractedItems = JSON.parse(aiResponseText);
        
        receiptItems = extractedItems.map(item => ({
          name: item.name,
          price: parseInt(item.price, 10),
          assignType: "all",
          customAssign: {}
        }));

      } catch (error) {
        console.error(error);
        alert("画像の読み取りに失敗しました。\n\n【エラー詳細】\n" + error.message + "\n\n※直らない場合は、URL内の「v1」を「v1beta」に書き換えてお試しください。");
      } finally {
        document.getElementById('loadingMessage').style.display = 'none';
        updateUI();
      }
    }

    function updateQty(itemIndex, memberIndex, delta) {
      let item = receiptItems[itemIndex];
      let currentQty = item.customAssign[memberIndex] || 0;
      let newQty = currentQty + delta;
      
      if (newQty < 0) newQty = 0;
      
      item.customAssign[memberIndex] = newQty;
      
      let totalCustomQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
      if (totalCustomQty > 0) {
        item.assignType = "custom";
      } else {
        item.assignType = "all";
      }
      updateUI();
    }

    function setAllAssign(itemIndex) {
      receiptItems[itemIndex].assignType = "all";
      receiptItems[itemIndex].customAssign = {};
      updateUI();
    }

    function updateUI() {
      // ★変更点：メンバーリストに傾斜比率の選択ドロップダウンを追加★
      const memberList = document.getElementById('memberList');
      memberList.innerHTML = "";
      members.forEach((m, index) => {
        memberList.innerHTML += `
          <li>
            <span>👤 ${m.name}</span>
            <div>
              <select class="weight-select" onchange="changeWeight(${index}, this.value)">
                <option value="1.0" ${m.weight === 1.0 ? 'selected' : ''}>通常 (1.0)</option>
                <option value="1.5" ${m.weight === 1.5 ? 'selected' : ''}>多め (1.5)</option>
                <option value="2.0" ${m.weight === 2.0 ? 'selected' : ''}>上司/主役 (2.0)</option>
                <option value="0.5" ${m.weight === 0.5 ? 'selected' : ''}>少なめ (0.5)</option>
                <option value="0.0" ${m.weight === 0.0 ? 'selected' : ''}>ご馳走(0.0)</option>
              </select>
              <button class="delete-btn" onclick="deleteMember(${index})">×</button>
            </div>
          </li>`;
      });

      const receiptArea = document.getElementById('receiptItemsArea');
      receiptArea.innerHTML = "";
      
      receiptItems.forEach((item, index) => {
        let isAll = item.assignType === "all";
        let optionsHTML = `
          <div class="assign-row ${isAll ? 'all-active' : ''}" onclick="setAllAssign(${index})" style="cursor: pointer;">
            <span style="font-weight: ${isAll ? 'bold' : 'normal'};">🍚 全員で割り勘（ごはんなど）</span>
            ${isAll ? '<span>✅</span>' : ''}
          </div>
        `;
        
        members.forEach((m, memberIdx) => {
          let qty = item.customAssign[memberIdx] || 0;
          let isCustom = (!isAll && qty > 0);
          
          optionsHTML += `
            <div class="assign-row ${isCustom ? 'active' : ''}">
              <span>🍺 ${m.name}</span>
              <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(${index}, ${memberIdx}, -1)">-</button>
                <span style="font-weight: bold; width: 16px; text-align: center;">${qty}</span>
                <button class="qty-btn plus" onclick="updateQty(${index}, ${memberIdx}, 1)">+</button>
              </div>
            </div>
          `;
        });

        receiptArea.innerHTML += `
          <div class="receipt-item">
            <div class="receipt-item-header">
              <span>${item.name}</span>
              <span>${item.price} 円</span>
            </div>
            <div class="assign-area">
              ${optionsHTML}
            </div>
          </div>
        `;
      });
    }

    // --- 割り勘計算ロジック（★傾斜配分対応版★） ---
    function calculate() {
      if (members.length === 0 || receiptItems.length === 0) {
        alert("メンバーの追加とレシートの読み込みを行ってください。");
        return;
      }

      let sharedFoodTotal = 0;
      let results = members.map(m => ({ name: m.name, foodAmount: 0, drinkTotal: 0, totalAmount: 0 }));

      // 1. 個別飲み物代と、全員割り勘（ごはん）の総額を集計
      receiptItems.forEach(item => {
        if (item.assignType === "all") {
          sharedFoodTotal += item.price;
        } else {
          let totalQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
          if (totalQty > 0) {
            for (let memberIdxStr in item.customAssign) {
              let qty = item.customAssign[memberIdxStr];
              if (qty > 0) {
                let memberIndex = parseInt(memberIdxStr, 10);
                let portionPrice = Math.ceil(item.price * (qty / totalQty));
                results[memberIndex].drinkTotal += portionPrice;
              }
            }
          } else {
            sharedFoodTotal += item.price;
          }
        }
      });

      // 2. ★ごはん代の傾斜計算★ 全員の比率（ウェイト）の合計を算出
      let totalWeight = members.reduce((sum, m) => sum + m.weight, 0);

      // 各メンバーの傾斜に応じてごはん代を分配
      results.forEach((res, index) => {
        let userWeight = members[index].weight;
        let foodPortion = 0;
        if (totalWeight > 0 && userWeight > 0) {
          // ごはん総額 × (自分の比率 / 全体の比率の合計)  ※端数は切り上げ
          foodPortion = Math.ceil(sharedFoodTotal * (userWeight / totalWeight));
        }
        res.foodAmount = foodPortion;
      });

      // 3. 結果の画面描画と総合計の計算
      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');
      const resultSummary = document.getElementById('resultSummary');
      
      resultList.innerHTML = "";
      let finalGrandTotal = 0; // ★機能追加：割り勘の最終合計額を貯める箱★

      results.forEach(res => {
        res.totalAmount = res.foodAmount + res.drinkTotal;
        finalGrandTotal += res.totalAmount; // 全員の請求額を足していく

        resultList.innerHTML += `
          <li style="flex-direction: column; align-items: flex-start;">
            <div class="result-item">${res.name}： ${res.totalAmount.toLocaleString()} 円</div>
            <div class="result-detail">（内訳: ごはん ${res.foodAmount.toLocaleString()}円 ＋ 個別 ${res.drinkTotal.toLocaleString()}円）</div>
          </li>
        `;
      });

      // ★機能追加：画面に「割り勘の合計金額」を表示してレシートと一致しているか確認可能にする★
      resultSummary.innerHTML = `💰 割り勘総合計: ${finalGrandTotal.toLocaleString()} 円`;

      resultArea.style.display = "block";
      
      // 計算完了後に結果画面までスムーズにスクロール
      resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    // ★機能追加：ワンタップ全画面（アプリ領域）スクショ保存機能★
    function takeScreenshot() {
      const element = document.getElementById('appContainer');
      
      // ボタンを一瞬非表示にする（スクショ画像にボタンが写り込まないようにする配慮）
      const screenshotBtn = document.querySelector('.btn-screenshot');
      screenshotBtn.style.visibility = 'hidden';

      html2canvas(element, {
        scale: 2, // 画質をきれいに2倍にする設定
        useCORS: true,
        backgroundColor: "#ffffff"
      }).then(canvas => {
        // スクショ用のリンクを作って自動クリック（ダウンロード）
        const link = document.createElement('a');
        link.download = '割り勘お会計結果.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        // ボタンの表示を元に戻す
        screenshotBtn.style.visibility = 'visible';
      }).catch(error => {
        console.error(error);
        alert("スクショの保存に失敗しました。スマホ自体のスクショ機能をお使いください。");
        screenshotBtn.style.visibility = 'visible';
      });
    }
  </script>

</body>
</html>
