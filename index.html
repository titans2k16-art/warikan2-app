<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居酒屋割り勘アプリ</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #333;
      margin: 0;
      padding: 16px;
    }
    .container {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      color: #0056b3;
      margin-top: 0;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #0056b3;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .input-group button {
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-weight: bold;
    }
    
    /* 設定エリア */
    .settings-area {
      background-color: #e9ecef;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
    }
    .settings-area input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .member-list {
      list-style: none;
      padding: 0;
      margin: 0;
      margin-bottom: 12px;
    }
    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8f9fa;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .delete-btn {
      color: #ff4d4f;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      padding: 0 4px;
    }
    .receipt-item {
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .receipt-item-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .assign-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px dashed #ccc;
      padding-top: 10px;
    }
    .assign-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      background-color: #ffffff;
      border: 1px solid #eee;
    }
    .assign-row.active {
      background-color: #fff0f0;
      border-color: #ff6b6b;
    }
    .assign-row.all-active {
      background-color: #e6f2ff;
      border-color: #0056b3;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background-color: #e2e8f0;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .qty-btn.plus {
      background-color: #ff6b6b;
      color: white;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
    }
    .btn-secondary {
      background-color: #6c757d;
      margin-top: 0;
    }
    #imagePreviewArea {
      display: none;
      text-align: center;
      margin-bottom: 16px;
    }
    #imagePreviewArea img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    #loadingMessage {
      display: none;
      text-align: center;
      color: #0056b3;
      font-weight: bold;
      margin-bottom: 16px;
    }
    #resultArea {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background-color: #fff0f0;
      border: 2px solid #ff6b6b;
      border-radius: 8px;
    }
    .result-item {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .result-detail {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🍻 居酒屋割り勘アプリ</h1>

    <div class="settings-area">
      <label for="apiKeyInput"><strong>⚙️ Gemini APIキー</strong> (初回のみ入力)</label>
      <input type="password" id="apiKeyInput" placeholder="AIza... または AQ. から始まるキー">
      <button onclick="saveApiKey()" style="padding: 6px 12px; background: #333; color: white; border: none; border-radius: 4px;">保存する</button>
      <span id="apiKeyStatus" style="color: green; display: none; margin-left: 8px;">保存しました！</span>
    </div>

    <div class="section">
      <div class="section-title">1. メンバー登録</div>
      <div class="input-group">
        <input type="text" id="memberName" placeholder="名前（例：山田）">
        <button onclick="addMember()">追加</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
    </div>

    <div class="section">
      <div class="section-title">2. レシート仕分け</div>
      
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleImageUpload(event)">
      <button class="btn btn-secondary" onclick="document.getElementById('cameraInput').click()" style="margin-bottom: 12px;">📸 レシートを撮影して読み込む</button>
      
      <div id="imagePreviewArea">
        <img id="receiptImagePreview" src="" alt="レシートプレビュー">
      </div>

      <div id="loadingMessage">⏳ レシートをAIで解析中... (数秒かかります)</div>

      <div id="receiptItemsArea"></div>
    </div>

    <button class="btn" onclick="calculate()">💰 割り勘を計算する</button>

    <div id="resultArea">
      <h2 style="font-size: 18px; margin-top: 0; color: #ff6b6b; text-align: center;">お会計結果</h2>
      <ul class="member-list" id="resultList"></ul>
    </div>
  </div>

  <script>
    let members = [];
    let receiptItems = [];

    // --- APIキーの保存と読み込み ---
    window.onload = function() {
      const savedKey = localStorage.getItem('geminiApiKey');
      if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
      }
    };

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        localStorage.setItem('geminiApiKey', key); 
        const status = document.getElementById('apiKeyStatus');
        status.style.display = 'inline';
        setTimeout(() => status.style.display = 'none', 2000);
      } else {
        alert("APIキーを入力してください。");
      }
    }

    // --- メンバー管理 ---
    function addMember() {
      const input = document.getElementById('memberName');
      const name = input.value.trim();
      if (name !== "") {
        members.push(name);
        input.value = "";
        updateUI();
      }
    }

    function deleteMember(index) {
      members.splice(index, 1);
      updateUI();
    }

    // --- 画像の読み込みとAI起動 ---
    async function handleImageUpload(event) {
      const apiKey = localStorage.getItem('geminiApiKey');
      if (!apiKey) {
        alert("一番上の設定欄にGemini APIキーを入力して保存してください！");
        event.target.value = "";
        return;
      }
      if (members.length === 0) {
        alert("先にメンバーを登録してください！");
        event.target.value = "";
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Image = e.target.result;
        document.getElementById('receiptImagePreview').src = base64Image;
        document.getElementById('imagePreviewArea').style.display = 'block';
        
        document.getElementById('loadingMessage').style.display = 'block';
        document.getElementById('receiptItemsArea').innerHTML = ""; 
        
        const base64Data = base64Image.split(',')[1];
        await analyzeReceiptWithGemini(base64Data, apiKey);
      }
      reader.readAsDataURL(file);
    }

    // --- ★AI（Gemini）と通信する処理（404対策版）★ ---
    async function analyzeReceiptWithGemini(base64Data, apiKey) {
      // 修正1：URLに直接APIキーを埋め込む方式に戻す
      // 修正2：モデル名を最新の「gemini-1.5-flash-latest」に変更
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
      
      const promptText = `
        このレシート画像から、品名と金額を読み取ってください。
        出力は必ず以下のJSON形式の配列「のみ」とし、マークダウン（\`\`\`json など）やその他の文章は一切含めないでください。
        合計金額やお釣りなどの項目は除外し、注文した品物だけを抽出してください。
        例: [{"name": "生ビール", "price": 500}, {"name": "枝豆", "price": 300}]
      `;

      const requestBody = {
        contents: [{
          parts: [
            { text: promptText },
            { inline_data: { mime_type: "image/jpeg", data: base64Data } }
          ]
        }]
      };

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json'
            // ヘッダーでのキー送信（x-goog-api-key）は干渉を防ぐため削除しました
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          const errorMessage = errorData.error ? errorData.error.message : response.statusText;
          throw new Error(`エラーコード: ${response.status}\n理由: ${errorMessage}`);
        }

        const data = await response.json();
        let aiResponseText = data.candidates[0].content.parts[0].text;
        
        aiResponseText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();

        const extractedItems = JSON.parse(aiResponseText);
        
        receiptItems = extractedItems.map(item => ({
          name: item.name,
          price: parseInt(item.price, 10),
          assignType: "all",
          customAssign: {}
        }));

      } catch (error) {
        console.error(error);
        alert("画像の読み取りに失敗しました。\n\n【エラー詳細】\n" + error.message);
      } finally {
        document.getElementById('loadingMessage').style.display = 'none';
        updateUI();
      }
    }

    // --- 数量の変更（＋ / −） ---
    function updateQty(itemIndex, memberIndex, delta) {
      let item = receiptItems[itemIndex];
      let currentQty = item.customAssign[memberIndex] || 0;
      let newQty = currentQty + delta;
      
      if (newQty < 0) newQty = 0;
      
      item.customAssign[memberIndex] = newQty;
      
      let totalCustomQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
      if (totalCustomQty > 0) {
        item.assignType = "custom";
      } else {
        item.assignType = "all";
      }
      updateUI();
    }

    // --- 強制的に「全員割り勘」に戻す ---
    function setAllAssign(itemIndex) {
      receiptItems[itemIndex].assignType = "all";
      receiptItems[itemIndex].customAssign = {};
      updateUI();
    }

    // --- 画面の更新 ---
    function updateUI() {
      const memberList = document.getElementById('memberList');
      memberList.innerHTML = "";
      members.forEach((name, index) => {
        memberList.innerHTML += `<li>${name} <button class="delete-btn" onclick="deleteMember(${index})">×</button></li>`;
      });

      const receiptArea = document.getElementById('receiptItemsArea');
      receiptArea.innerHTML = "";
      
      receiptItems.forEach((item, index) => {
        let isAll = item.assignType === "all";
        let optionsHTML = `
          <div class="assign-row ${isAll ? 'all-active' : ''}" onclick="setAllAssign(${index})" style="cursor: pointer;">
            <span style="font-weight: ${isAll ? 'bold' : 'normal'};">🍚 全員で割り勘（ごはんなど）</span>
            ${isAll ? '<span>✅</span>' : ''}
          </div>
        `;
        
        members.forEach((name, memberIdx) => {
          let qty = item.customAssign[memberIdx] || 0;
          let isCustom = (!isAll && qty > 0);
          
          optionsHTML += `
            <div class="assign-row ${isCustom ? 'active' : ''}">
              <span>🍺 ${name}</span>
              <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(${index}, ${memberIdx}, -1)">-</button>
                <span style="font-weight: bold; width: 16px; text-align: center;">${qty}</span>
                <button class="qty-btn plus" onclick="updateQty(${index}, ${memberIdx}, 1)">+</button>
              </div>
            </div>
          `;
        });

        receiptArea.innerHTML += `
          <div class="receipt-item">
            <div class="receipt-item-header">
              <span>${item.name}</span>
              <span>${item.price} 円</span>
            </div>
            <div class="assign-area">
              ${optionsHTML}
            </div>
          </div>
        `;
      });
    }

    // --- 割り勘計算ロジック ---
    function calculate() {
      if (members.length === 0 || receiptItems.length === 0) {
        alert("メンバーの追加とレシートの読み込みを行ってください。");
        return;
      }

      let sharedFoodTotal = 0;
      let results = members.map(name => ({ name: name, drinkTotal: 0, totalAmount: 0 }));

      receiptItems.forEach(item => {
        if (item.assignType === "all") {
          sharedFoodTotal += item.price;
        } else {
          let totalQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
          if (totalQty > 0) {
            for (let memberIdxStr in item.customAssign) {
              let qty = item.customAssign[memberIdxStr];
              if (qty > 0) {
                let memberIndex = parseInt(memberIdxStr, 10);
                let portionPrice = Math.ceil(item.price * (qty / totalQty));
                results[memberIndex].drinkTotal += portionPrice;
              }
            }
          } else {
            sharedFoodTotal += item.price;
          }
        }
      });

      const foodPerPerson = Math.ceil(sharedFoodTotal / members.length);

      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');
      resultList.innerHTML = "";

      results.forEach(res => {
        res.totalAmount = foodPerPerson + res.drinkTotal;
        resultList.innerHTML += `
          <li style="flex-direction: column; align-items: flex-start;">
            <div class="result-item">${res.name}： ${res.totalAmount.toLocaleString()} 円</div>
            <div class="result-detail">（内訳: ごはん ${foodPerPerson.toLocaleString()}円 ＋ 個別 ${res.drinkTotal.toLocaleString()}円）</div>
          </li>
        `;
      });

      resultArea.style.display = "block";
    }
  </script>

</body>
</html>
