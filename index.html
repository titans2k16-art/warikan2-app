<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居酒屋割り勘アプリ</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #333;
      margin: 0;
      padding: 16px;
    }
    .container {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      color: #0056b3; /* ちょっとシックな青色に変更してみました */
      margin-top: 0;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #0056b3;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }
    /* 追加：入力フォームのスタイル */
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    .input-group button {
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-weight: bold;
    }
    /* 追加：メンバーリストのスタイル */
    .member-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8f9fa;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 15px;
    }
    .delete-btn {
      color: #ff4d4f;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      padding: 0 4px;
    }
    .dummy-box {
      background-color: #f8f9fa;
      border: 1px dashed #ccc;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🍻 居酒屋割り勘アプリ</h1>

    <div class="section">
      <div class="section-title">1. メンバー登録</div>
      <div class="input-group">
        <input type="text" id="memberName" placeholder="名前（例：山田）">
        <button onclick="addMember()">追加</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
    </div>

    <div class="section">
      <div class="section-title">2. レシート読み込み</div>
      <div class="dummy-box">📸 カメラを起動するボタンが入ります</div>
    </div>

    <div class="section">
      <div class="section-title">3. 仕分け（ごはん / 飲み物）</div>
      <div class="dummy-box">読み込んだ品物リストと、誰の飲み物か選ぶ画面が入ります</div>
    </div>

    <button class="btn">割り勘を計算する</button>
  </div>

  <script>
    // メンバーの名前を保存する「箱（配列）」を用意
    let members = [];

    // 追加ボタンが押された時の処理
    function addMember() {
      const input = document.getElementById('memberName');
      const name = input.value.trim(); // 入力された文字を取得

      if (name !== "") {
        members.push(name); // 箱に名前を追加
        input.value = ""; // 入力欄を空にする
        updateList(); // 画面を更新する
      }
    }

    // 削除（×）ボタンが押された時の処理
    function deleteMember(index) {
      members.splice(index, 1); // 箱から指定した名前を削る
      updateList(); // 画面を更新する
    }

    // 画面のリストを最新状態に書き換える処理
    function updateList() {
      const list = document.getElementById('memberList');
      list.innerHTML = ""; // 一度リストをリセット

      // 箱の中身を順番に取り出して、HTMLとして画面にくっつける
      members.forEach((name, index) => {
        list.innerHTML += `
          <li>
            ${name}
            <button class="delete-btn" onclick="deleteMember(${index})">×</button>
          </li>
        `;
      });
    }
  </script>

</body>
</html>
