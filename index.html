<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居酒屋割り勘アプリ</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #333;
      margin: 0;
      padding: 16px;
    }
    .container {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      color: #0056b3;
      margin-top: 0;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #0056b3;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .input-group button {
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-weight: bold;
    }
    .member-list {
      list-style: none;
      padding: 0;
      margin: 0;
      margin-bottom: 12px;
    }
    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8f9fa;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .delete-btn {
      color: #ff4d4f;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      padding: 0 4px;
    }
    
    /* レシート仕分けの数量カウンターデザイン */
    .receipt-item {
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .receipt-item-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .assign-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px dashed #ccc;
      padding-top: 10px;
    }
    .assign-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      background-color: #ffffff;
      border: 1px solid #eee;
    }
    .assign-row.active {
      background-color: #fff0f0;
      border-color: #ff6b6b;
    }
    .assign-row.all-active {
      background-color: #e6f2ff;
      border-color: #0056b3;
    }
    
    /* ＋ / − ボタン */
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background-color: #e2e8f0;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .qty-btn.plus {
      background-color: #ff6b6b;
      color: white;
    }
    
    .btn {
      display: block;
      width: 100%;
      background-color: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
    }
    .btn-secondary {
      background-color: #6c757d;
      margin-top: 0;
    }
    
    #resultArea {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background-color: #fff0f0;
      border: 2px solid #ff6b6b;
      border-radius: 8px;
    }
    .result-item {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .result-detail {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🍻 居酒屋割り勘アプリ</h1>

    <div class="section">
      <div class="section-title">1. メンバー登録</div>
      <div class="input-group">
        <input type="text" id="memberName" placeholder="名前（例：山田）">
        <button onclick="addMember()">追加</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
    </div>

    <div class="section">
      <div class="section-title">2. レシート仕分け</div>
      <button class="btn btn-secondary" onclick="loadDummyReceipt()" style="margin-bottom: 12px;">📸 レシートを読み込む（テスト用）</button>
      <div id="receiptItemsArea"></div>
    </div>

    <button class="btn" onclick="calculate()">💰 割り勘を計算する</button>

    <div id="resultArea">
      <h2 style="font-size: 18px; margin-top: 0; color: #ff6b6b; text-align: center;">お会計結果</h2>
      <ul class="member-list" id="resultList"></ul>
    </div>
  </div>

  <script>
    let members = [];
    let receiptItems = [];

    // --- メンバー管理 ---
    function addMember() {
      const input = document.getElementById('memberName');
      const name = input.value.trim();
      if (name !== "") {
        members.push(name);
        input.value = "";
        updateUI();
      }
    }

    function deleteMember(index) {
      members.splice(index, 1);
      updateUI();
    }

    // --- レシート読み込み（ダミー） ---
    function loadDummyReceipt() {
      if (members.length === 0) {
        alert("先にメンバーを登録してください！");
        return;
      }
      
      // データ構造を変更。assignTypeと、誰がいくつ飲んだかを記録するcustomAssignを用意
      receiptItems = [
        { name: "生ビール 3点", price: 1650, assignType: "all", customAssign: {} },
        { name: "牛すじ煮込み", price: 680, assignType: "all", customAssign: {} },
        { name: "ウーロン茶 2点", price: 600, assignType: "all", customAssign: {} },
        { name: "刺身盛り合わせ", price: 2400, assignType: "all", customAssign: {} },
        { name: "レモンサワー 1点", price: 450, assignType: "all", customAssign: {} }
      ];
      updateUI();
    }

    // --- 数量の変更（＋ / −）が押された時の処理 ---
    function updateQty(itemIndex, memberIndex, delta) {
      let item = receiptItems[itemIndex];
      let currentQty = item.customAssign[memberIndex] || 0;
      let newQty = currentQty + delta;
      
      // マイナスにはならないようにする
      if (newQty < 0) newQty = 0;
      
      item.customAssign[memberIndex] = newQty;
      
      // 1人でも数量が1以上なら「個別割り勘」、全員0なら「全員割り勘（ごはん）」に戻す
      let totalCustomQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
      
      if (totalCustomQty > 0) {
        item.assignType = "custom";
      } else {
        item.assignType = "all";
      }
      
      updateUI(); // 画面を再描画
    }

    // --- 強制的に「全員割り勘」に戻すボタンの処理 ---
    function setAllAssign(itemIndex) {
      receiptItems[itemIndex].assignType = "all";
      receiptItems[itemIndex].customAssign = {}; // 個別の数量をリセット
      updateUI();
    }

    // --- 画面の更新 ---
    function updateUI() {
      const memberList = document.getElementById('memberList');
      memberList.innerHTML = "";
      members.forEach((name, index) => {
        memberList.innerHTML += `<li>${name} <button class="delete-btn" onclick="deleteMember(${index})">×</button></li>`;
      });

      const receiptArea = document.getElementById('receiptItemsArea');
      receiptArea.innerHTML = "";
      
      receiptItems.forEach((item, index) => {
        let isAll = item.assignType === "all";

        // 「全員割り勘」ボタン行
        let optionsHTML = `
          <div class="assign-row ${isAll ? 'all-active' : ''}" onclick="setAllAssign(${index})" style="cursor: pointer;">
            <span style="font-weight: ${isAll ? 'bold' : 'normal'};">🍚 全員で割り勘（ごはんなど）</span>
            ${isAll ? '<span>✅</span>' : ''}
          </div>
        `;
        
        // 個人ごとの ＋ / − 行
        members.forEach((name, memberIdx) => {
          let qty = item.customAssign[memberIdx] || 0;
          let isCustom = (!isAll && qty > 0);
          
          optionsHTML += `
            <div class="assign-row ${isCustom ? 'active' : ''}">
              <span>🍺 ${name}</span>
              <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(${index}, ${memberIdx}, -1)">-</button>
                <span style="font-weight: bold; width: 16px; text-align: center;">${qty}</span>
                <button class="qty-btn plus" onclick="updateQty(${index}, ${memberIdx}, 1)">+</button>
              </div>
            </div>
          `;
        });

        receiptArea.innerHTML += `
          <div class="receipt-item">
            <div class="receipt-item-header">
              <span>${item.name}</span>
              <span>${item.price} 円</span>
            </div>
            <div class="assign-area">
              ${optionsHTML}
            </div>
          </div>
        `;
      });
    }

    // --- 割り勘計算ロジック（割合計算） ---
    function calculate() {
      if (members.length === 0 || receiptItems.length === 0) {
        alert("メンバーの追加とレシートの読み込みを行ってください。");
        return;
      }

      let sharedFoodTotal = 0;
      let results = members.map(name => ({
        name: name,
        drinkTotal: 0,
        totalAmount: 0
      }));

      // 仕分け結果を集計
      receiptItems.forEach(item => {
        if (item.assignType === "all") {
          sharedFoodTotal += item.price;
        } else {
          // 「＋」された合計数を計算（例：Aさんが2、Bさんが1なら合計3）
          let totalQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
          
          if (totalQty > 0) {
            // 各メンバーの数量に応じて金額を分配（端数は切り上げ）
            for (let memberIdxStr in item.customAssign) {
              let qty = item.customAssign[memberIdxStr];
              if (qty > 0) {
                let memberIndex = parseInt(memberIdxStr, 10);
                // 金額 × (自分が飲んだ数 / 全体の数)
                let portionPrice = Math.ceil(item.price * (qty / totalQty));
                results[memberIndex].drinkTotal += portionPrice;
              }
            }
          } else {
            // 万が一数量が0なら全員割り勘に回す
            sharedFoodTotal += item.price;
          }
        }
      });

      const foodPerPerson = Math.ceil(sharedFoodTotal / members.length);

      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');
      resultList.innerHTML = "";

      results.forEach(res => {
        res.totalAmount = foodPerPerson + res.drinkTotal;
        resultList.innerHTML += `
          <li style="flex-direction: column; align-items: flex-start;">
            <div class="result-item">${res.name}： ${res.totalAmount.toLocaleString()} 円</div>
            <div class="result-detail">（内訳: ごはん ${foodPerPerson.toLocaleString()}円 ＋ 個別 ${res.drinkTotal.toLocaleString()}円）</div>
          </li>
        `;
      });

      resultArea.style.display = "block";
    }
  </script>

</body>
</html>
