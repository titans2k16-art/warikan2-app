<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居酒屋割り勘アプリ</title>
  <style>
    /* （前回までのスタイルと同じです） */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #333;
      margin: 0;
      padding: 16px;
    }
    .container {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      color: #0056b3;
      margin-top: 0;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #0056b3;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .input-group button {
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-weight: bold;
    }
    .member-list {
      list-style: none;
      padding: 0;
      margin: 0;
      margin-bottom: 12px;
    }
    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8f9fa;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .delete-btn {
      color: #ff4d4f;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      padding: 0 4px;
    }
    .receipt-item {
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .receipt-item-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .assign-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px dashed #ccc;
      padding-top: 10px;
    }
    .assign-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      background-color: #ffffff;
      border: 1px solid #eee;
    }
    .assign-row.active {
      background-color: #fff0f0;
      border-color: #ff6b6b;
    }
    .assign-row.all-active {
      background-color: #e6f2ff;
      border-color: #0056b3;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background-color: #e2e8f0;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .qty-btn.plus {
      background-color: #ff6b6b;
      color: white;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
    }
    .btn-secondary {
      background-color: #6c757d;
      margin-top: 0;
    }
    
    /* ★追加：プレビュー画像とローディングのスタイル★ */
    #imagePreviewArea {
      display: none;
      text-align: center;
      margin-bottom: 16px;
    }
    #imagePreviewArea img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    #loadingMessage {
      display: none;
      text-align: center;
      color: #0056b3;
      font-weight: bold;
      margin-bottom: 16px;
    }
    
    #resultArea {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background-color: #fff0f0;
      border: 2px solid #ff6b6b;
      border-radius: 8px;
    }
    .result-item {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .result-detail {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🍻 居酒屋割り勘アプリ</h1>

    <div class="section">
      <div class="section-title">1. メンバー登録</div>
      <div class="input-group">
        <input type="text" id="memberName" placeholder="名前（例：山田）">
        <button onclick="addMember()">追加</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
    </div>

    <div class="section">
      <div class="section-title">2. レシート仕分け</div>
      
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleImageUpload(event)">
      
      <button class="btn btn-secondary" onclick="document.getElementById('cameraInput').click()" style="margin-bottom: 12px;">📸 レシートを撮影して読み込む</button>
      
      <div id="imagePreviewArea">
        <img id="receiptImagePreview" src="" alt="レシートプレビュー">
      </div>

      <div id="loadingMessage">⏳ AIがレシートを解析中...</div>

      <div id="receiptItemsArea"></div>
    </div>

    <button class="btn" onclick="calculate()">💰 割り勘を計算する</button>

    <div id="resultArea">
      <h2 style="font-size: 18px; margin-top: 0; color: #ff6b6b; text-align: center;">お会計結果</h2>
      <ul class="member-list" id="resultList"></ul>
    </div>
  </div>

  <script>
    let members = [];
    let receiptItems = [];

    // --- メンバー管理 ---
    function addMember() {
      const input = document.getElementById('memberName');
      const name = input.value.trim();
      if (name !== "") {
        members.push(name);
        input.value = "";
        updateUI();
      }
    }

    function deleteMember(index) {
      members.splice(index, 1);
      updateUI();
    }

    // --- ★追加：カメラで撮影した時の処理★ ---
    function handleImageUpload(event) {
      if (members.length === 0) {
        alert("先にメンバーを登録してください！");
        event.target.value = ""; // 入力をリセット
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      // 1. 画像を画面に表示する
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('receiptImagePreview').src = e.target.result;
        document.getElementById('imagePreviewArea').style.display = 'block';
        
        // 2. 解析中のメッセージを出す
        document.getElementById('loadingMessage').style.display = 'block';
        document.getElementById('receiptItemsArea').innerHTML = ""; // リストを一度消す
        
        // 3. AIの読み取りを「フリ」でシミュレーション（約2秒待つ）
        setTimeout(() => {
          simulateAIOCR();
        }, 2000);
      }
      reader.readAsDataURL(file);
    }

    // --- AI読み取り（シミュレーション） ---
    function simulateAIOCR() {
      // 実際はここでAIに画像を送信し、結果を受け取ります。今回はダミーデータを使います。
      receiptItems = [
        { name: "生ビール 3点", price: 1650, assignType: "all", customAssign: {} },
        { name: "牛すじ煮込み", price: 680, assignType: "all", customAssign: {} },
        { name: "ウーロン茶 2点", price: 600, assignType: "all", customAssign: {} },
        { name: "刺身盛り合わせ", price: 2400, assignType: "all", customAssign: {} },
        { name: "レモンサワー 1点", price: 450, assignType: "all", customAssign: {} }
      ];
      
      // 解析中メッセージを消して、リストを表示する
      document.getElementById('loadingMessage').style.display = 'none';
      updateUI();
    }

    // --- 数量の変更（＋ / −）が押された時の処理 ---
    function updateQty(itemIndex, memberIndex, delta) {
      let item = receiptItems[itemIndex];
      let currentQty = item.customAssign[memberIndex] || 0;
      let newQty = currentQty + delta;
      
      if (newQty < 0) newQty = 0;
      
      item.customAssign[memberIndex] = newQty;
      
      let totalCustomQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
      if (totalCustomQty > 0) {
        item.assignType = "custom";
      } else {
        item.assignType = "all";
      }
      updateUI();
    }

    // --- 強制的に「全員割り勘」に戻す ---
    function setAllAssign(itemIndex) {
      receiptItems[itemIndex].assignType = "all";
      receiptItems[itemIndex].customAssign = {};
      updateUI();
    }

    // --- 画面の更新 ---
    function updateUI() {
      const memberList = document.getElementById('memberList');
      memberList.innerHTML = "";
      members.forEach((name, index) => {
        memberList.innerHTML += `<li>${name} <button class="delete-btn" onclick="deleteMember(${index})">×</button></li>`;
      });

      const receiptArea = document.getElementById('receiptItemsArea');
      receiptArea.innerHTML = "";
      
      receiptItems.forEach((item, index) => {
        let isAll = item.assignType === "all";

        let optionsHTML = `
          <div class="assign-row ${isAll ? 'all-active' : ''}" onclick="setAllAssign(${index})" style="cursor: pointer;">
            <span style="font-weight: ${isAll ? 'bold' : 'normal'};">🍚 全員で割り勘（ごはんなど）</span>
            ${isAll ? '<span>✅</span>' : ''}
          </div>
        `;
        
        members.forEach((name, memberIdx) => {
          let qty = item.customAssign[memberIdx] || 0;
          let isCustom = (!isAll && qty > 0);
          
          optionsHTML += `
            <div class="assign-row ${isCustom ? 'active' : ''}">
              <span>🍺 ${name}</span>
              <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(${index}, ${memberIdx}, -1)">-</button>
                <span style="font-weight: bold; width: 16px; text-align: center;">${qty}</span>
                <button class="qty-btn plus" onclick="updateQty(${index}, ${memberIdx}, 1)">+</button>
              </div>
            </div>
          `;
        });

        receiptArea.innerHTML += `
          <div class="receipt-item">
            <div class="receipt-item-header">
              <span>${item.name}</span>
              <span>${item.price} 円</span>
            </div>
            <div class="assign-area">
              ${optionsHTML}
            </div>
          </div>
        `;
      });
    }

    // --- 割り勘計算ロジック（割合計算） ---
    function calculate() {
      if (members.length === 0 || receiptItems.length === 0) {
        alert("メンバーの追加とレシートの読み込みを行ってください。");
        return;
      }

      let sharedFoodTotal = 0;
      let results = members.map(name => ({ name: name, drinkTotal: 0, totalAmount: 0 }));

      receiptItems.forEach(item => {
        if (item.assignType === "all") {
          sharedFoodTotal += item.price;
        } else {
          let totalQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
          if (totalQty > 0) {
            for (let memberIdxStr in item.customAssign) {
              let qty = item.customAssign[memberIdxStr];
              if (qty > 0) {
                let memberIndex = parseInt(memberIdxStr, 10);
                let portionPrice = Math.ceil(item.price * (qty / totalQty));
                results[memberIndex].drinkTotal += portionPrice;
              }
            }
          } else {
            sharedFoodTotal += item.price;
          }
        }
      });

      const foodPerPerson = Math.ceil(sharedFoodTotal / members.length);

      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');
      resultList.innerHTML = "";

      results.forEach(res => {
        res.totalAmount = foodPerPerson + res.drinkTotal;
        resultList.innerHTML += `
          <li style="flex-direction: column; align-items: flex-start;">
            <div class="result-item">${res.name}： ${res.totalAmount.toLocaleString()} 円</div>
            <div class="result-detail">（内訳: ごはん ${foodPerPerson.toLocaleString()}円 ＋ 個別 ${res.drinkTotal.toLocaleString()}円）</div>
          </li>
        `;
      });

      resultArea.style.display = "block";
    }
  </script>

</body>
</html>
