<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居酒屋割り勘アプリ</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #333;
      margin: 0;
      padding: 16px;
    }
    .container {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      color: #0056b3;
      margin-top: 0;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #0056b3;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .input-group button {
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-weight: bold;
    }
    .member-list {
      list-style: none;
      padding: 0;
      margin: 0;
      margin-bottom: 12px;
    }
    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8f9fa;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .delete-btn {
      color: #ff4d4f;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      padding: 0 4px;
    }
    
    /* 仕分けリスト用のデザイン */
    .receipt-item {
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .receipt-item-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .receipt-item select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background-color: #fff;
    }
    
    .btn {
      display: block;
      width: 100%;
      background-color: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
    }
    .btn-secondary {
      background-color: #6c757d;
      margin-top: 0;
    }
    
    #resultArea {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background-color: #fff0f0;
      border: 2px solid #ff6b6b;
      border-radius: 8px;
    }
    .result-item {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .result-detail {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🍻 居酒屋割り勘アプリ</h1>

    <div class="section">
      <div class="section-title">1. メンバー登録</div>
      <div class="input-group">
        <input type="text" id="memberName" placeholder="名前（例：山田）">
        <button onclick="addMember()">追加</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
    </div>

    <div class="section">
      <div class="section-title">2. レシート仕分け</div>
      <button class="btn btn-secondary" onclick="loadDummyReceipt()" style="margin-bottom: 12px;">📸 レシートを読み込む（テスト用）</button>
      
      <div id="receiptItemsArea"></div>
    </div>

    <button class="btn" onclick="calculate()">💰 割り勘を計算する</button>

    <div id="resultArea">
      <h2 style="font-size: 18px; margin-top: 0; color: #ff6b6b; text-align: center;">お会計結果</h2>
      <ul class="member-list" id="resultList"></ul>
    </div>
  </div>

  <script>
    let members = [];
    let receiptItems = [];

    // --- メンバー管理 ---
    function addMember() {
      const input = document.getElementById('memberName');
      const name = input.value.trim();
      if (name !== "") {
        members.push(name);
        input.value = "";
        updateUI();
      }
    }

    function deleteMember(index) {
      members.splice(index, 1);
      updateUI();
    }

    // --- レシート読み込み（ダミー） ---
    function loadDummyReceipt() {
      if (members.length === 0) {
        alert("先にメンバーを登録してください！");
        return;
      }
      
      // OCRで読み取ったと仮定するデータ
      receiptItems = [
        { name: "生ビール", price: 550, assignedTo: "food" },
        { name: "牛すじ煮込み", price: 680, assignedTo: "food" },
        { name: "ウーロン茶", price: 300, assignedTo: "food" },
        { name: "串焼き盛り合わせ", price: 1200, assignedTo: "food" },
        { name: "レモンサワー", price: 450, assignedTo: "food" }
      ];
      updateUI();
    }

    // 仕分け先（ドロップダウン）が変更されたときの処理
    function changeAssign(itemIndex, value) {
      receiptItems[itemIndex].assignedTo = value;
    }

    // --- 画面の更新 ---
    function updateUI() {
      // 1. メンバーリストの描画
      const memberList = document.getElementById('memberList');
      memberList.innerHTML = "";
      members.forEach((name, index) => {
        memberList.innerHTML += `<li>${name} <button class="delete-btn" onclick="deleteMember(${index})">×</button></li>`;
      });

      // 2. レシート仕分けエリアの描画
      const receiptArea = document.getElementById('receiptItemsArea');
      receiptArea.innerHTML = "";
      
      receiptItems.forEach((item, index) => {
        // 誰の飲み物かを選ぶドロップダウンの作成
        let optionsHTML = `<option value="food" ${item.assignedTo === 'food' ? 'selected' : ''}>🍚 ごはん（全員割り勘）</option>`;
        members.forEach((name, memberIdx) => {
          optionsHTML += `<option value="${memberIdx}" ${item.assignedTo === String(memberIdx) ? 'selected' : ''}>🍺 ${name} の飲み物</option>`;
        });

        receiptArea.innerHTML += `
          <div class="receipt-item">
            <div class="receipt-item-header">
              <span>${item.name}</span>
              <span>${item.price}円</span>
            </div>
            <select onchange="changeAssign(${index}, this.value)">
              ${optionsHTML}
            </select>
          </div>
        `;
      });
    }

    // --- 割り勘計算ロジック ---
    function calculate() {
      if (members.length === 0 || receiptItems.length === 0) {
        alert("メンバーの追加とレシートの読み込みを行ってください。");
        return;
      }

      let sharedFoodTotal = 0;
      
      // 各メンバーごとの合計額を記録する箱を準備
      let results = members.map(name => ({
        name: name,
        drinkTotal: 0,
        totalAmount: 0
      }));

      // 仕分け結果を集計
      receiptItems.forEach(item => {
        if (item.assignedTo === "food") {
          // 全員割り勘のごはん代に加算
          sharedFoodTotal += item.price;
        } else {
          // 選ばれた個人の飲み物代に加算
          const memberIndex = parseInt(item.assignedTo, 10);
          results[memberIndex].drinkTotal += item.price;
        }
      });

      // ごはん代を人数で割る（端数切り上げ）
      const foodPerPerson = Math.ceil(sharedFoodTotal / members.length);

      // 最終的な請求額を計算して画面に表示
      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');
      resultList.innerHTML = "";

      results.forEach(res => {
        res.totalAmount = foodPerPerson + res.drinkTotal;
        resultList.innerHTML += `
          <li style="flex-direction: column; align-items: flex-start;">
            <div class="result-item">${res.name}： ${res.totalAmount.toLocaleString()} 円</div>
            <div class="result-detail">（内訳: ごはん ${foodPerPerson.toLocaleString()}円 ＋ 飲み物 ${res.drinkTotal.toLocaleString()}円）</div>
          </li>
        `;
      });

      resultArea.style.display = "block";
    }
  </script>

</body>
</html>
