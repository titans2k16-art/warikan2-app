<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スマドリ許すまじ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #333;
      margin: 0;
      padding: 16px;
    }
    .container {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      color: #0056b3;
      margin-top: 0;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #0056b3;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .input-group button {
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-weight: bold;
    }
    
    .settings-area {
      background-color: #e9ecef;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
    }
    .settings-area input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .member-list {
      list-style: none;
      padding: 0;
      margin: 0;
      margin-bottom: 12px;
    }
    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8f9fa;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    /* 結果画面の傾斜設定用セレクトボックス */
    .weight-select {
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 12px;
      background-color: #fff;
      margin-top: 6px;
      width: 100%;
    }
    .delete-btn {
      color: #ff4d4f;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      padding: 0 4px;
    }
    .receipt-item {
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .receipt-item-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .assign-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px dashed #ccc;
      padding-top: 10px;
    }
    .assign-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      background-color: #ffffff;
      border: 1px solid #eee;
    }
    .assign-row.active {
      background-color: #fff0f0;
      border-color: #ff6b6b;
    }
    .assign-row.all-active {
      background-color: #e6f2ff;
      border-color: #0056b3;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background-color: #e2e8f0;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .qty-btn.plus {
      background-color: #ff6b6b;
      color: white;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
      cursor: pointer;
    }
    .btn-secondary {
      background-color: #6c757d;
      margin-top: 0;
    }
    .btn-half {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      margin-top: 0;
    }
    .btn-screenshot {
      background-color: #28a745; 
      margin-top: 12px;
    }
    #imagePreviewArea {
      display: none;
      text-align: center;
      margin-bottom: 16px;
    }
    #imagePreviewArea img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    #loadingMessage {
      display: none;
      text-align: center;
      color: #0056b3;
      font-weight: bold;
      margin-bottom: 16px;
    }
    #resultArea {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background-color: #fff0f0;
      border: 2px solid #ff6b6b;
      border-radius: 8px;
    }
    .result-item {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .result-detail {
      font-size: 12px;
      color: #666;
    }
    .result-summary {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 2px dashed #ff6b6b;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: #d9534f;
    }
    /* 税金設定のボタンスタイル */
    .tax-setting {
      display: flex;
      justify-content: space-between;
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 16px;
    }
    .tax-setting label {
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container" id="appContainer">
    <h1>🫗スマドリ許すまじ🫗</h1>

    <div class="settings-area">
      <label for="apiKeyInput"><strong>⚙️ Gemini APIキー</strong> (初回のみ入力)</label>
      <input type="password" id="apiKeyInput" placeholder="AQ. から始まるキーを入力">
      <button onclick="saveApiKey()" style="padding: 6px 12px; background: #333; color: white; border: none; border-radius: 4px;">保存する</button>
      <span id="apiKeyStatus" style="color: green; display: none; margin-left: 8px;">保存しました！</span>
    </div>

    <div class="section">
      <div class="section-title">1. メンバー登録</div>
      <div class="input-group">
        <input type="text" id="memberName" placeholder="名前（例：山田）">
        <button onclick="addMember()">追加</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
    </div>

    <div class="section">
      <div class="section-title">2. レシート仕分け</div>
      
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleImageUpload(event)">
      <input type="file" id="galleryInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
      
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <button class="btn btn-secondary btn-half" onclick="triggerCamera()">📸 カメラ起動</button>
        <button class="btn btn-secondary btn-half" onclick="triggerGallery()">📁 アルバム選択</button>
      </div>
      
      <div id="imagePreviewArea">
        <img id="receiptImagePreview" src="" alt="レシートプレビュー">
      </div>

      <div id="loadingMessage">⏳ 最新のGemini 2.5でレシートを解析中...</div>

      <div id="receiptItemsArea"></div>
    </div>

    <div class="section-title">3. 計算設定</div>
    <div class="tax-setting">
      <label><input type="radio" name="taxType" value="inner" checked> 🔘 内税（そのまま）</label>
      <label><input type="radio" name="taxType" value="outer"> ⚪️ 外税（＋10%）</label>
    </div>

    <button class="btn" onclick="calculate()">💰 割り勘を計算する</button>

    <div id="resultArea">
      <h2 style="font-size: 18px; margin-top: 0; color: #ff6b6b; text-align: center;">お会計結果</h2>
      <div style="font-size: 12px; color: #666; text-align: center; margin-bottom: 12px;">💡 ここで「ごはん代」の比率を調整できます</div>
      
      <ul class="member-list" id="resultList"></ul>
      <div id="resultSummary" class="result-summary"></div>
      <button class="btn btn-screenshot" onclick="takeScreenshot()">📸 画面をスクショ保存する</button>
    </div>
  </div>

  <script>
    let members = [];
    let receiptItems = [];

    // 計算後に使う一時保存用の変数
    let globalSharedFood = 0;
    let globalDrinks = [];

    window.onload = function() {
      const savedKey = localStorage.getItem('geminiApiKey');
      if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
      }
    };

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        localStorage.setItem('geminiApiKey', key); 
        const status = document.getElementById('apiKeyStatus');
        status.style.display = 'inline';
        setTimeout(() => status.style.display = 'none', 2000);
      } else {
        alert("APIキーを入力してください。");
      }
    }

    function addMember() {
      const input = document.getElementById('memberName');
      const name = input.value.trim();
      if (name !== "") {
        members.push({ name: name, weight: 1.0 });
        input.value = "";
        updateUI();
      }
    }

    function deleteMember(index) {
      members.splice(index, 1);
      updateUI();
    }

    // カメラ起動用
    function triggerCamera() {
      if (members.length === 0) {
        alert("🚨 メンバーが登録されていません！");
        return;
      }
      document.getElementById('cameraInput').click();
    }

    // アルバム起動用
    function triggerGallery() {
      if (members.length === 0) {
        alert("🚨 メンバーが登録されていません！");
        return;
      }
      document.getElementById('galleryInput').click();
    }

    async function handleImageUpload(event) {
      const apiKey = localStorage.getItem('geminiApiKey');
      if (!apiKey) {
        alert("一番上の設定欄にGemini APIキーを入力して保存してください！");
        event.target.value = "";
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Image = e.target.result;
        document.getElementById('receiptImagePreview').src = base64Image;
        document.getElementById('imagePreviewArea').style.display = 'block';
        document.getElementById('loadingMessage').style.display = 'block';
        document.getElementById('receiptItemsArea').innerHTML = ""; 
        
        const base64Data = base64Image.split(',')[1];
        await analyzeReceiptWithGemini(base64Data, apiKey);
      }
      reader.readAsDataURL(file);
    }

    async function analyzeReceiptWithGemini(base64Data, apiKey) {
      const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const promptText = `
        このレシート画像から、品名と金額を読み取ってください。
        出力は必ず以下のJSON形式の配列「のみ」とし、マークダウン（\`\`\`json など）やその他の文章は一切含めないでください。
        合計金額やお釣りなどの項目は除外し、注文した品物だけを抽出してください。
        例: [{"name": "生ビール", "price": 500}, {"name": "枝豆", "price": 300}]
      `;

      const requestBody = {
        contents: [{ parts: [ { text: promptText }, { inlineData: { mimeType: "image/jpeg", data: base64Data } } ] }]
      };

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) throw new Error(`通信エラー: ${response.status}`);

        const data = await response.json();
        let aiResponseText = data.candidates[0].content.parts[0].text;
        aiResponseText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();

        const extractedItems = JSON.parse(aiResponseText);
        receiptItems = extractedItems.map(item => ({
          name: item.name,
          price: parseInt(item.price, 10),
          assignType: "all",
          customAssign: {}
        }));
      } catch (error) {
        alert("画像の読み取りに失敗しました。");
      } finally {
        document.getElementById('loadingMessage').style.display = 'none';
        updateUI();
      }
    }

    function updateQty(itemIndex, memberIndex, delta) {
      let item = receiptItems[itemIndex];
      let currentQty = item.customAssign[memberIndex] || 0;
      let newQty = currentQty + delta;
      if (newQty < 0) newQty = 0;
      
      item.customAssign[memberIndex] = newQty;
      
      let totalCustomQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
      item.assignType = (totalCustomQty > 0) ? "custom" : "all";
      updateUI();
    }

    function setAllAssign(itemIndex) {
      receiptItems[itemIndex].assignType = "all";
      receiptItems[itemIndex].customAssign = {};
      updateUI();
    }

    function updateUI() {
      // 傾斜設定は結果画面に移動したため、メンバーリストはシンプルに表示
      const memberList = document.getElementById('memberList');
      memberList.innerHTML = "";
      members.forEach((m, index) => {
        memberList.innerHTML += `<li><span>👤 ${m.name}</span><button class="delete-btn" onclick="deleteMember(${index})">×</button></li>`;
      });

      const receiptArea = document.getElementById('receiptItemsArea');
      receiptArea.innerHTML = "";
      receiptItems.forEach((item, index) => {
        let isAll = item.assignType === "all";
        let optionsHTML = `
          <div class="assign-row ${isAll ? 'all-active' : ''}" onclick="setAllAssign(${index})" style="cursor: pointer;">
            <span style="font-weight: ${isAll ? 'bold' : 'normal'};">🍚 全員で割り勘（ごはんなど）</span>
            ${isAll ? '<span>✅</span>' : ''}
          </div>
        `;
        members.forEach((m, memberIdx) => {
          let qty = item.customAssign[memberIdx] || 0;
          let isCustom = (!isAll && qty > 0);
          optionsHTML += `
            <div class="assign-row ${isCustom ? 'active' : ''}">
              <span>🍺 ${m.name}</span>
              <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(${index}, ${memberIdx}, -1)">-</button>
                <span style="font-weight: bold; width: 16px; text-align: center;">${qty}</span>
                <button class="qty-btn plus" onclick="updateQty(${index}, ${memberIdx}, 1)">+</button>
              </div>
            </div>
          `;
        });
        receiptArea.innerHTML += `<div class="receipt-item"><div class="receipt-item-header"><span>${item.name}</span><span>${item.price} 円</span></div><div class="assign-area">${optionsHTML}</div></div>`;
      });
    }

    // --- ★1. ボタン押下時の集計処理（税金の加算）★ ---
    function calculate() {
      if (members.length === 0 || receiptItems.length === 0) {
        alert("レシートを読み込んで仕分けを行ってください。");
        return;
      }

      // 税金の設定を読み取る（外税なら1.1倍）
      let isOuterTax = document.querySelector('input[name="taxType"]:checked').value === "outer";
      let taxMultiplier = isOuterTax ? 1.1 : 1.0;

      let sharedFoodBase = 0;
      let drinksBase = members.map(() => 0);

      receiptItems.forEach(item => {
        if (item.assignType === "all") {
          sharedFoodBase += item.price;
        } else {
          let totalQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
          if (totalQty > 0) {
            for (let memberIdxStr in item.customAssign) {
              let qty = item.customAssign[memberIdxStr];
              if (qty > 0) {
                let memberIndex = parseInt(memberIdxStr, 10);
                let portionPrice = Math.ceil(item.price * (qty / totalQty));
                drinksBase[memberIndex] += portionPrice;
              }
            }
          } else {
            sharedFoodBase += item.price;
          }
        }
      });

      // 税金を適用した合計金額をグローバル変数に保存（結果画面で使い回すため）
      globalSharedFood = Math.ceil(sharedFoodBase * taxMultiplier);
      globalDrinks = drinksBase.map(d => Math.ceil(d * taxMultiplier));

      // 結果の描画を呼び出す
      renderResults();
      
      const resultArea = document.getElementById('resultArea');
      resultArea.style.display = "block";
      resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    // --- ★2. 結果画面の描画処理（リアルタイム再計算）★ ---
    function updateResultWeight(index, value) {
      members[index].weight = parseFloat(value);
      renderResults(); // 傾斜が変わったらここだけやり直す
    }

    function renderResults() {
      const resultList = document.getElementById('resultList');
      const resultSummary = document.getElementById('resultSummary');
      resultList.innerHTML = "";
      
      let totalWeight = members.reduce((sum, m) => sum + m.weight, 0);
      let finalGrandTotal = 0;

      members.forEach((m, index) => {
        let foodPortion = 0;
        if (totalWeight > 0 && m.weight > 0) {
          foodPortion = Math.ceil(globalSharedFood * (m.weight / totalWeight));
        }
        
        let drinkTotal = globalDrinks[index];
        let personTotal = foodPortion + drinkTotal;
        finalGrandTotal += personTotal;

        // 結果リストの中に「傾斜ドロップダウン」を埋め込む
        resultList.innerHTML += `
          <li style="flex-direction: column; align-items: flex-start; background-color: #fff; border: 1px solid #ddd;">
            <div class="result-item">${m.name}： ${personTotal.toLocaleString()} 円</div>
            <div class="result-detail" style="margin-bottom: 8px;">（内訳: ごはん ${foodPortion.toLocaleString()}円 ＋ 個別 ${drinkTotal.toLocaleString()}円）</div>
            <select class="weight-select" onchange="updateResultWeight(${index}, this.value)">
              <option value="1.0" ${m.weight === 1.0 ? 'selected' : ''}>通常 (1.0)</option>
              <option value="1.5" ${m.weight === 1.5 ? 'selected' : ''}>多め (1.5)</option>
              <option value="2.0" ${m.weight === 2.0 ? 'selected' : ''}>上司/主役 (2.0)</option>
              <option value="0.5" ${m.weight === 0.5 ? 'selected' : ''}>少なめ (0.5)</option>
              <option value="0.0" ${m.weight === 0.0 ? 'selected' : ''}>ご馳走 (0.0)</option>
            </select>
          </li>
        `;
      });

      resultSummary.innerHTML = `💰 割り勘総合計: ${finalGrandTotal.toLocaleString()} 円`;
    }

    function takeScreenshot() {
      const element = document.getElementById('appContainer');
      const screenshotBtn = document.querySelector('.btn-screenshot');
      screenshotBtn.style.visibility = 'hidden';

      html2canvas(element, {
        scale: 2, useCORS: true, backgroundColor: "#ffffff"
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = '割り勘お会計結果.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        screenshotBtn.style.visibility = 'visible';
      }).catch(error => {
        alert("スクショの保存に失敗しました。");
        screenshotBtn.style.visibility = 'visible';
      });
    }
  </script>

</body>
</html>
