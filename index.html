<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スマドリ許すまじ</title>
  <!-- ★フォント＆アイコンのプロ仕様ライブラリを読み込み★ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* 全体フォントと今っぽい背景色の設定 */
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f8fafc; /* 青みを含んだ、ガジェット感のある最先端グレー */
      color: #1e293b;
      margin: 0;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }
    
    /* コンテナ：角丸を大きくし、影を広くふんわり、薄くかける */
    .container {
      background-color: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.04); /* 今どきの極薄ふんわり影 */
      max-width: 400px;
      margin: 0 auto;
    }
    
    /* タイトルまわりの洗練 */
    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: #0f172a; /* 深みのあるスタイリッシュネイビー */
      margin-top: 8px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.5px;
    }
    
    .section {
      margin-bottom: 28px;
    }
    
    /* 見出しのデザインを今っぽくシンプルに */
    .section-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    /* 入力フォームの角丸とフォーカス時の線の美化 */
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background-color: #f8fafc;
      transition: all 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    .input-group button {
      background-color: #0f172a;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    
    /* APIキー設定エリアのモダン化 */
    .settings-area {
      background-color: #f1f5f9;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 24px;
      font-size: 13px;
    }
    .settings-area label {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #475569;
    }
    .settings-area input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      box-sizing: border-box;
      font-family: inherit;
    }

    /* メンバーリスト */
    .member-list {
      list-style: none;
      padding: 0;
      margin: 0;
      margin-bottom: 12px;
    }
    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8fafc;
      border: 1px solid #f1f5f9;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    
    /* 結果画面の傾斜設定用セレクトボックス */
    .weight-select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 13px;
      font-family: inherit;
      color: #334155;
      background-color: #fff;
      margin-top: 8px;
      width: 100%;
      cursor: pointer;
    }
    .delete-btn {
      color: #94a3b8;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      display: flex;
      align-items: center;
    }
    .delete-btn:hover {
      color: #f43f5e;
    }
    
    /* レシートアイテムのカード化と薄い影 */
    .receipt-item {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
    }
    .receipt-item-header {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 15px;
      color: #0f172a;
      margin-bottom: 12px;
    }
    .assign-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid #f1f5f9;
      padding-top: 12px;
    }
    .assign-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 10px;
      background-color: #f8fafc;
      border: 1px solid #f1f5f9;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
    }
    .assign-row.active {
      background-color: #fff1f2; /* 個別選択時は淡いローズピンク */
      border-color: #ffe4e6;
      color: #e11d48;
    }
    .assign-row.all-active {
      background-color: #eff6ff; /* 全員選択時は淡いスタイリッシュブルー */
      border-color: #dbeafe;
      color: #1d4ed8;
    }
    
    /* 数量コントローラーの美化 */
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background-color: #e2e8f0;
      color: #475569;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .qty-btn.plus {
      background-color: #0f172a;
      color: white;
    }
    
    /* メインボタンのフラット＆モダン化 */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      background-color: #e11d48; /* 原色の赤を、高級感のあるコーラルローズに変更 */
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      margin-top: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(225, 29, 72, 0.15);
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-secondary {
      background-color: #ffffff;
      border: 1px solid #cbd5e1;
      color: #334155;
      margin-top: 0;
      box-shadow: none;
    }
    .btn-half {
      flex: 1;
      padding: 10px;
      font-size: 13px;
      margin-top: 0;
      border-radius: 10px;
    }
    .btn-screenshot {
      background-color: #10b981; /* 綺麗なエメラルドグリーン */
      margin-top: 16px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    }
    
    #imagePreviewArea {
      display: none;
      text-align: center;
      margin-bottom: 16px;
    }
    #imagePreviewArea img {
      max-width: 100%;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
    }
    #loadingMessage {
      display: none;
      text-align: center;
      color: #2563eb;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 16px;
    }
    
    /* 結果表示エリアの美化 */
    #resultArea {
      display: none;
      margin-top: 28px;
      padding: 20px;
      background-color: #fff1f2;
      border: 1px solid #ffe4e6;
      border-radius: 18px;
    }
    .result-item {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .result-detail {
      font-size: 12px;
      color: #64748b;
    }
    .result-summary {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px dashed #fda4af;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      color: #e11d48;
    }
    
    /* 税金設定のモダン化 */
    .tax-setting {
      display: flex;
      justify-content: space-between;
      background: #f8fafc;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      margin-bottom: 16px;
    }
    .tax-setting label {
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #475569;
    }
    
    /* オリジナルポップアップ */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(15, 23, 42, 0.4);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px); /* すりガラス効果 */
    }
    .modal-content {
      background-color: #ffffff;
      padding: 24px;
      border-radius: 20px;
      width: 80%;
      max-width: 300px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
    }
    .modal-message {
      font-size: 14px;
      font-weight: 500;
      color: #334155;
      margin-bottom: 20px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .modal-close-btn {
      background-color: #0f172a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container" id="appContainer">
    <!-- ★絵文字をスタイッシュなWebアイコンへ置き換え★ -->
    <h1>
      <span class="material-symbols-outlined" style="font-size: 26px; color: #e11d48;">local_bar</span>
      スマドリ許すまじ
      <span class="material-symbols-outlined" style="font-size: 26px; color: #e11d48;">local_bar</span>
    </h1>

    <div class="settings-area">
      <label for="apiKeyInput">
        <span class="material-symbols-outlined">settings</span>
        <strong>Gemini APIキー</strong> (初回のみ入力)
      </label>
      <input type="password" id="apiKeyInput" placeholder="AQ. から始まるキーを入力">
      <button onclick="saveApiKey()">保存</button>
      <span id="apiKeyStatus" style="color: #10b981; display: none; margin-left: 8px; font-weight: bold;">保存しました！</span>
    </div>

    <div class="section">
      <div class="section-title">
        <span class="material-symbols-outlined">group_add</span>
        1. メンバー登録
      </div>
      <div class="input-group">
        <input type="text" id="memberName" placeholder="名前（例：山田）">
        <button onclick="addMember()">追加</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
    </div>

    <div class="section">
      <div class="section-title">
        <span class="material-symbols-outlined">receipt_long</span>
        2. レシート仕分け
      </div>
      
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleImageUpload(event)">
      <input type="file" id="galleryInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
      
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <button class="btn btn-secondary btn-half" onclick="triggerCamera()">
          <span class="material-symbols-outlined">photo_camera</span>カメラ起動
        </button>
        <button class="btn btn-secondary btn-half" onclick="triggerGallery()">
          <span class="material-symbols-outlined">image</span>アルバム選択
        </button>
      </div>
      
      <div id="imagePreviewArea">
        <img id="receiptImagePreview" src="" alt="レシートプレビュー">
      </div>

      <div id="loadingMessage">⏳ 最新のGemini 2.5でレシートを解析中...</div>

      <div id="receiptItemsArea"></div>
    </div>

    <div class="section-title">
      <span class="material-symbols-outlined">tune</span>
      3. 計算設定
    </div>
    <div class="tax-setting">
      <label>
        <input type="radio" name="taxType" value="inner" checked>
        <span class="material-symbols-outlined">payments</span>内税（そのまま）
      </label>
      <label>
        <input type="radio" name="taxType" value="outer">
        <span class="material-symbols-outlined">add_card</span>外税（＋10%）
      </label>
    </div>

    <button class="btn" onclick="calculate()">
      <span class="material-symbols-outlined">calculate</span>割り勘を計算する
    </button>

    <div id="resultArea">
      <h2 style="font-size: 16px; font-weight: 700; margin-top: 0; color: #0f172a; text-align: center; display: flex; justify-content: center; align-items: center; gap: 4px;">
        <span class="material-symbols-outlined" style="color: #e11d48;">analytics</span>お会計結果
      </h2>
      <div style="font-size: 12px; color: #64748b; text-align: center; margin-bottom: 16px; display: flex; justify-content: center; align-items: center; gap: 2px;">
        <span class="material-symbols-outlined" style="font-size: 14px;">lightbulb</span>ここで「ごはん代」の比率を調整できます
      </div>
      
      <ul class="member-list" id="resultList"></ul>
      <div id="resultSummary" class="result-summary"></div>
      
      <!-- ★ココを修正！アイコンを download に変更し、文字を短くしました★ -->
      <button class="btn btn-screenshot" onclick="takeScreenshot()">
        <span class="material-symbols-outlined">download</span>スクショを保存する
      </button>
    </div>
  </div>

  <div id="customModal" class="modal-overlay">
    <div class="modal-content">
      <div id="modalMessage" class="modal-message"></div>
      <button class="modal-close-btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>

  <script>
    let members = [];
    let receiptItems = [];

    let globalSharedFoodBase = 0;
    let globalDrinksBase = [];
    let globalTaxMultiplier = 1.0;
    let globalTargetTotal = 0;

    function showModal(message) {
      document.getElementById('modalMessage').textContent = message;
      document.getElementById('customModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('customModal').style.display = 'none';
    }

    window.onload = function() {
      const savedKey = localStorage.getItem('geminiApiKey');
      if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
      }
    };

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        localStorage.setItem('geminiApiKey', key); 
        const status = document.getElementById('apiKeyStatus');
        status.style.display = 'inline';
        setTimeout(() => status.style.display = 'none', 2000);
      } else {
        showModal("APIキーを入力してください。");
      }
    }

    function addMember() {
      const input = document.getElementById('memberName');
      const name = input.value.trim();
      if (name !== "") {
        members.push({ name: name, weight: 1.0 });
        input.value = "";
        updateUI();
      }
    }

    function deleteMember(index) {
      members.splice(index, 1);
      updateUI();
    }

    function triggerCamera() {
      if (members.length === 0) {
        showModal("メンバーが登録されていません。一番上のフォームから名前を追加してください。");
        return;
      }
      document.getElementById('cameraInput').click();
    }

    function triggerGallery() {
      if (members.length === 0) {
        showModal("メンバーが登録されていません。一番上のフォームから名前を追加してください。");
        return;
      }
      document.getElementById('galleryInput').click();
    }

    async function handleImageUpload(event) {
      const apiKey = localStorage.getItem('geminiApiKey');
      if (!apiKey) {
        showModal("設定欄にGemini APIキーを入力して保存してください。");
        event.target.value = "";
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Image = e.target.result;
        document.getElementById('receiptImagePreview').src = base64Image;
        document.getElementById('imagePreviewArea').style.display = 'block';
        document.getElementById('loadingMessage').style.display = 'block';
        document.getElementById('receiptItemsArea').innerHTML = ""; 
        
        const base64Data = base64Image.split(',')[1];
        await analyzeReceiptWithGemini(base64Data, apiKey);
      }
      reader.readAsDataURL(file);
    }

    async function analyzeReceiptWithGemini(base64Data, apiKey) {
      const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const promptText = `
        このレシート画像から、品名と金額を読み取ってください。
        出力は必ず以下のJSON形式の配列「のみ」とし、マークダウン（\`\`\`json など）やその他の文章は一切含めないでください。
        合計金額やお釣りなどの項目は除外し、注文した品物だけを抽出してください。
        例: [{"name": "生ビール", "price": 500}, {"name": "枝豆", "price": 300}]
      `;

      const requestBody = {
        contents: [{ parts: [ { text: promptText }, { inlineData: { mimeType: "image/jpeg", data: base64Data } } ] }]
      };

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) throw new Error(`通信エラー: ${response.status}`);

        const data = await response.json();
        let aiResponseText = data.candidates[0].content.parts[0].text;
        aiResponseText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();

        const extractedItems = JSON.parse(aiResponseText);
        receiptItems = extractedItems.map(item => ({
          name: item.name,
          price: parseInt(item.price, 10),
          assignType: "all",
          customAssign: {}
        }));
      } catch (error) {
        showModal("画像の読み取りに失敗しました。明るい場所で撮り直すか、スクショでお試しください。");
      } finally {
        document.getElementById('loadingMessage').style.display = 'none';
        updateUI();
      }
    }

    function updateQty(itemIndex, memberIndex, delta) {
      let item = receiptItems[itemIndex];
      let currentQty = item.customAssign[memberIndex] || 0;
      let newQty = currentQty + delta;
      if (newQty < 0) newQty = 0;
      
      item.customAssign[memberIndex] = newQty;
      
      let totalCustomQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
      item.assignType = (totalCustomQty > 0) ? "custom" : "all";
      updateUI();
    }

    function setAllAssign(itemIndex) {
      receiptItems[itemIndex].assignType = "all";
      receiptItems[itemIndex].customAssign = {};
      updateUI();
    }

    function updateUI() {
      const memberList = document.getElementById('memberList');
      memberList.innerHTML = "";
      members.forEach((m, index) => {
        memberList.innerHTML += `
          <li>
            <span style="display:flex; align-items:center; gap:4px;"><span class="material-symbols-outlined" style="color:#64748b;">person</span>${m.name}</span>
            <button class="delete-btn" onclick="deleteMember(${index})"><span class="material-symbols-outlined">close</span></button>
          </li>`;
      });

      const receiptArea = document.getElementById('receiptItemsArea');
      receiptArea.innerHTML = "";
      receiptItems.forEach((item, index) => {
        let isAll = item.assignType === "all";
        let optionsHTML = `
          <div class="assign-row ${isAll ? 'all-active' : ''}" onclick="setAllAssign(${index})" style="cursor: pointer;">
            <span style="display:flex; align-items:center; gap:4px; font-weight: ${isAll ? '700' : '500'};">
              <span class="material-symbols-outlined" style="font-size:18px;">restaurant</span>全員で割り勘（ごはんなど）
            </span>
            ${isAll ? '<span class="material-symbols-outlined" style="font-size:18px;">check_circle</span>' : ''}
          </div>
        `;
        members.forEach((m, memberIdx) => {
          let qty = item.customAssign[memberIdx] || 0;
          let isCustom = (!isAll && qty > 0);
          optionsHTML += `
            <div class="assign-row ${isCustom ? 'active' : ''}">
              <span style="display:flex; align-items:center; gap:4px;"><span class="material-symbols-outlined" style="font-size:18px;">sports_bar</span>${m.name}</span>
              <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(${index}, ${memberIdx}, -1)">-</button>
                <span style="font-weight: 700; width: 16px; text-align: center;">${qty}</span>
                <button class="qty-btn plus" onclick="updateQty(${index}, ${memberIdx}, 1)">+</button>
              </div>
            </div>
          `;
        });
        receiptArea.innerHTML += `<div class="receipt-item"><div class="receipt-item-header"><span>${item.name}</span><span>${item.price} 円</span></div><div class="assign-area">${optionsHTML}</div></div>`;
      });
    }

    function calculate() {
      if (members.length === 0 || receiptItems.length === 0) {
        showModal("レシートを読み込んで仕分けを行ってください。");
        return;
      }

      let isOuterTax = document.querySelector('input[name="taxType"]:checked').value === "outer";
      globalTaxMultiplier = isOuterTax ? 1.1 : 1.0;

      globalSharedFoodBase = 0;
      globalDrinksBase = members.map(() => 0);
      let rawTotal = 0;

      receiptItems.forEach(item => {
        rawTotal += item.price;
        if (item.assignType === "all") {
          globalSharedFoodBase += item.price;
        } else {
          let totalQty = Object.values(item.customAssign).reduce((sum, val) => sum + val, 0);
          if (totalQty > 0) {
            for (let memberIdxStr in item.customAssign) {
              let qty = item.customAssign[memberIdxStr];
              if (qty > 0) {
                let memberIndex = parseInt(memberIdxStr, 10);
                let portionPrice = item.price * (qty / totalQty);
                globalDrinksBase[memberIndex] += portionPrice;
              }
            }
          } else {
            globalSharedFoodBase += item.price;
          }
        }
      });

      globalTargetTotal = Math.round(rawTotal * globalTaxMultiplier);
      renderResults();
      
      const resultArea = document.getElementById('resultArea');
      resultArea.style.display = "block";
      resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    function updateResultWeight(index, value) {
      members[index].weight = parseFloat(value);
      renderResults(); 
    }

    function renderResults() {
      const resultList = document.getElementById('resultList');
      const resultSummary = document.getElementById('resultSummary');
      resultList.innerHTML = "";
      
      let totalWeight = members.reduce((sum, m) => sum + m.weight, 0);
      
      let finalAmounts = [];
      let foodPortions = [];
      let drinkPortions = [];
      let currentSum = 0;

      members.forEach((m, index) => {
        let exactFoodBase = 0;
        if (totalWeight > 0 && m.weight > 0) {
          exactFoodBase = globalSharedFoodBase * (m.weight / totalWeight);
        }
        
        let foodPortion = Math.floor(exactFoodBase * globalTaxMultiplier);
        let drinkPortion = Math.floor(globalDrinksBase[index] * globalTaxMultiplier);
        
        foodPortions.push(foodPortion);
        drinkPortions.push(drinkPortion);
        
        let personTotal = foodPortion + drinkPortion;
        finalAmounts.push(personTotal);
        currentSum += personTotal;
      });

      let remainder = globalTargetTotal - currentSum;
      let adjustAmounts = new Array(members.length).fill(0);
      if (remainder !== 0 && members.length > 0) {
        adjustAmounts[0] = remainder;
        finalAmounts[0] += remainder;
      }

      members.forEach((m, index) => {
        let food = foodPortions[index];
        let drink = drinkPortions[index];
        let adjust = adjustAmounts[index];
        let total = finalAmounts[index];

        let breakdownStr = `（内訳: ごはん ${food.toLocaleString()}円 ＋ 個別 ${drink.toLocaleString()}円`;
        if (adjust !== 0) {
          let sign = adjust > 0 ? '＋' : '－';
          breakdownStr += ` ${sign} 端数調整 ${Math.abs(adjust).toLocaleString()}円`;
        }
        breakdownStr += `）`;

        resultList.innerHTML += `
          <li style="flex-direction: column; align-items: flex-start; background-color: #fff; border: 1px solid #e2e8f0;">
            <div class="result-item">${m.name}： ${total.toLocaleString()} 円</div>
            <div class="result-detail" style="margin-bottom: 8px;">${breakdownStr}</div>
            <select class="weight-select" onchange="updateResultWeight(${index}, this.value)">
              <option value="1.0" ${m.weight === 1.0 ? 'selected' : ''}>通常 (1.0)</option>
              <option value="1.5" ${m.weight === 1.5 ? 'selected' : ''}>多め (1.5)</option>
              <option value="2.0" ${m.weight === 2.0 ? 'selected' : ''}>上司/主役 (2.0)</option>
              <option value="0.5" ${m.weight === 0.5 ? 'selected' : ''}>少なめ (0.5)</option>
              <option value="0.0" ${m.weight === 0.0 ? 'selected' : ''}>ご馳走 (0.0)</option>
            </select>
          </li>
        `;
      });

      let summaryHTML = `💰 割り勘総合計: ${globalTargetTotal.toLocaleString()} 円`;
      if (remainder !== 0) {
        summaryHTML += `
          <div style="font-size: 13px; color: #1e40af; background-color: #eff6ff; padding: 12px; border-radius: 10px; margin-top: 12px; font-weight: normal; text-align: left; line-height: 1.5; display: flex; gap: 4px; align-items: flex-start; border:1px solid #bfdbfe;">
            <span class="material-symbols-outlined" style="font-size:18px; margin-top:1px;">info</span>
            <span>レシートにピッタリ合わせるため、生じた端数（${remainder}円）は1人目の「${members[0].name}さん」に寄せて自動調整しました。</span>
          </div>
        `;
      }
      resultSummary.innerHTML = summaryHTML;
    }

    function takeScreenshot() {
      const element = document.getElementById('appContainer');
      const screenshotBtn = document.querySelector('.btn-screenshot');
      screenshotBtn.style.visibility = 'hidden';

      html2canvas(element, {
        scale: 2, useCORS: true, backgroundColor: "#ffffff"
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = '割り勘お会計結果.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        screenshotBtn.style.visibility = 'visible';
      }).catch(error => {
        showModal("スクショの保存に失敗しました。");
        screenshotBtn.style.visibility = 'visible';
      });
    }
  </script>

</body>
</html>
